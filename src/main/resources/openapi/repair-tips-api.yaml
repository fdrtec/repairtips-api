openapi: 3.0.3
info:
  title: Repair Tips API
  description: API for managing repair tips
  version: 1.0.1
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      tags:
        - "Health"
      operationId: "checkHealth"
      summary: Health check
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck200Response'
  /parts:
    get:
      tags:
        - "Part"
      operationId: "getParts"
      summary: "Get all parts"
      responses:
        '200':
          description: List of parts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartDto'
    post:
      tags:
        - "Part"
      operationId: "createPart"
      summary: "Create a new part"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartDto'
      responses:
        '201':
          description: Part created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartDto'
        '409':
          description: Part already exists (conflict)
  /parts/{id}:
    get:
      tags:
        - "Part"
      operationId: "getPartById"
      summary: "Get part by id"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Part found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartDto'
        '404':
          description: Not found
    put:
      tags:
        - "Part"
      operationId: "updatePart"
      summary: "Update part by id"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartDto'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartDto'
        '404':
          description: Not found
    delete:
      tags:
        - "Part"
      operationId: "deletePart"
      summary: "Delete part by id"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
components:
  schemas:
    HealthCheck200Response:
      type: object
      properties:
        status:
          type: string
          example: "UP"
      required:
        - status
    PartDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        partName:
          type: string
          example: "Roller Kit"
        partNumber:
          type: string
          example: "RK-001"
        manufacturer:
          type: string
          example: "HP"
      required:
        - partName
        - partNumber
 