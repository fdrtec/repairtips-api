openapi: 3.0.3
info:
  title: Repair Tips API
  description: API for managing repair tips
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "UP"
  /api/parts:
    get:
      summary: Get all parts
      responses:
        '200':
          description: List of parts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PartRepresentation'
components:
  schemas:
    PartRepresentation:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        partName:
          type: string
          example: "Roller Kit"
        partNumber:
          type: string
          example: "RK-001"
        manufacturer:
          type: string
          example: "HP"